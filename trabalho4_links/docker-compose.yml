version: '3'
services:
  api:
    build: ./ruby_api
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  locust:
    image: locustio/locust
    volumes:
      - ./locust:/locust
    entrypoint: ["tail", "-f", "/dev/null"]
